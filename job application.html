<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Job Application Form</title>
    <link rel="stylesheet" href="job application.css" />
  </head>
  <body>
    <form>
      <div class="container">
        <h2 class="title">Job Application Form</h2>
        <!---------candidate detail----->
        <h3>Candidate Details</h3>
        <div class="grid-3">
          <div>
            <label for="firstName">First Name <span>*</span></label>
            <input
              type="text"
              id="firstName"
              name="firstName"
              placeholder="Enter your first name"
              required
              oninput="this.value=this.value.replace(/[^a-zA-Z]/g,'')"
            />
          </div>

          <div>
            <label for="lastName">Last Name <span>*</span></label>
            <input
              type="text"
              id="lastName"
              name="lastName"
              placeholder="Enter your last name"
              required
              oninput="this.value=this.value.replace(/[^a-zA-Z]/g,'')"
            />
          </div>

          <div>
            <label for="dob">Date of Birth <span>*</span></label>
            <input type="date" id="dob" name="dob" required />
          </div>

          <div>
            <label>Gender <span>*</span></label>
            <select>
              <option>Select</option>
              <option>Male</option>
              <option>Female</option>
            </select>
          </div>

          <div>
            <label>Experience <span>*</span></label>
            <input type="number" placeholder="Example:4" required oninput="this.value=this.value.replace(/[^0-9]/g,'')" />
          </div>
          <div>
            <label>LinkedIn Profile<span>*</span></label>
            <input
              type="url"
              placeholder="Enter your LinkedIn profile URL"
              required
            />
          </div>
        </div>
        <!-----------Application Details------------>

        <h3>Application Details</h3>
        <div class="grid-3">
          <div>
            <label>Email <span>*</span></label>
            <input type="email" placeholder="Enter your Email" required />
          </div>
          <div>
            <label>Mobile Number <span>*</span></label>
            <input
              type="tel"
              placeholder="PhoneNumber"
              maxlength="10"
              pattern="\d{10}"
              required
              autocomplete="tel"
              name="Mobilenumber"
              oninput="this.value=this.value.replace(/\D/g,'')"
            />
          </div>
          <div>
            <label>Education <span>*</span></label>
            <select required>
              <option value="">Select</option>
              <option value="highschool">High School</option>
              <option value="bachelor">Bachelor's Degree</option>
              <option value="master">Master's Degree</option>
              <option value="phd">PhD</option>
            </select>
          </div>
          <div>
            <label>Skills <span>*</span></label>
            <input type="text" placeholder="Enter your skills" required />
          </div>
          <div>
            <label>Resume <span>*</span></label>
            <input type="file" required />
          </div>
        </div>

        <!---------Address Details------------>
        <h3>Address Details</h3>
        <div class="grid-3">
          <div>
            <label>Street <span>*</span></label>
            <input type="text" placeholder="Enter Street" required />
          </div>
          <div>
            <label>City <span>*</span></label>
            <input type="text" placeholder="Enter City" required />
          </div>
          <div>
            <label>State <span>*</span></label>
            <select required>
              <option value="">Select State</option>
              <option value="Andhra Pradesh">Andhra Pradesh</option>
              <option value="Arunachal Pradesh">Arunachal Pradesh</option>
              <option value="Assam">Assam</option>
              <option value="Bihar">Bihar</option>
              <option value="Chhattisgarh">Chhattisgarh</option>
              <option value="Goa">Goa</option>
              <option value="Gujarat">Gujarat</option>
              <option value="Haryana">Haryana</option>
              <option value="Himachal Pradesh">Himachal Pradesh</option>
              <option value="Jharkhand">Jharkhand</option>
              <option value="Karnataka">Karnataka</option>
              <option value="Kerala">Kerala</option>
              <option value="Madhya Pradesh">Madhya Pradesh</option>
              <option value="Maharashtra">Maharashtra</option>
              <option value="Manipur">Manipur</option>
              <option value="Meghalaya">Meghalaya</option>
              <option value="Mizoram">Mizoram</option>
              <option value="Nagaland">Nagaland</option>
              <option value="Odisha">Odisha</option>
              <option value="Punjab">Punjab</option>
              <option value="Rajasthan">Rajasthan</option>
              <option value="Sikkim">Sikkim</option>
              <option value="Tamil Nadu">Tamil Nadu</option>
              <option value="Telangana">Telangana</option>
              <option value="Tripura">Tripura</option>
              <option value="Uttar Pradesh">Uttar Pradesh</option>
              <option value="Uttarakhand">Uttarakhand</option>
              <option value="West Bengal">West Bengal</option>
            </select>
          </div>
          <div>
            <label>Zip Code <span>*</span></label>
            <input type="text" placeholder="Enter Zip Code" required />
          </div>
        </div>
        <!-----------Technical Details------------>
        <div>
          <h3>Technical Details</h3>
          <label>Add Technologies <span>*</span></label>
          <input
            type="text"
            placeholder="Add Technologies"
            required
          />
          <span>  <button  class="add-btn" type="button">Add</button></span>
        </div>
      </div>
      <!-----------Buttons--------->
      <div class="buttons">
       <span><button type="submit" class="submit-btn">Submit</button></span>
        <span><button type="reset" class="reset-btn">Reset</button></span>
      </div>
    </form>
  </body>
</html>
